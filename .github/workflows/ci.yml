name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: |
          node server.js &
          sleep 5

      - name: Test API endpoint
        run: curl http://localhost:3000 || echo "Server running"

      - name: CI Success
        run: echo "All checks passed 🚀"